// ================================================================

function formatPrice(n) {
  return '€' + n.toLocaleString('de-DE');
}

function formatPriceShort(n) {
  if (n >= 1000000) return '€' + (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return '€' + (n / 1000).toFixed(0) + 'K';
  return '€' + n;
}

// ================================================================
// NAVIGATION
// ================================================================
function navigate(screenId, data) {
  // Hide all screens
  document.querySelectorAll('main > section').forEach(s => { s.classList.add('hidden'); s.classList.remove('screen-enter'); });
  // Show target
  const target = document.getElementById('screen-' + screenId);
  if (target) { target.classList.remove('hidden'); void target.offsetWidth; target.classList.add('screen-enter'); }
  // Scroll to top
  const main = document.querySelector('main');
  if (main) main.scrollTop = 0;
  // Update sidebar
  updateSidebar(screenId);
  // Update breadcrumb
  updateBreadcrumb(screenId);
  // Close mobile sidebar
  const sidebar = document.getElementById('sidebar');
  if (sidebar) { sidebar.classList.remove('sidebar-open'); document.getElementById('sidebar-backdrop').classList.add('hidden'); }
  // Screen-specific rendering
  state.currentScreen = screenId;
  if (screenId === 'dashboard') renderDashboard();
  if (screenId === 'boats') renderBoatsGrid();
  if (screenId === 'boat-detail') renderBoatDetail(data);
  if (screenId === 'equipment') renderEquipmentPage(data);
  if (screenId === 'config-1') renderConfigStep1();
  if (screenId === 'config-2') renderConfigStep2();
  if (screenId === 'config-4') renderReview();
  if (screenId === 'quotes') renderQuotesTable();
  if (screenId === 'quote-detail') renderQuoteDetail(data);
  // Re-init lucide icons
  if (window.lucide) lucide.createIcons();
}

function updateSidebar(screenId) {
  const navKey = NAV_MAP[screenId] || screenId;
  document.querySelectorAll('[data-nav]').forEach(btn => {
    if (btn.dataset.nav === navKey) {
      btn.className = 'nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-primary text-white';
    } else {
      btn.className = 'nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-white/70 hover:bg-white/10 hover:text-white';
    }
  });
}

function updateBreadcrumb(screenId) {
  const bc = document.getElementById('breadcrumb');
  if (bc) bc.innerHTML = '<span class="text-slate-500 text-sm">' + (BREADCRUMBS[screenId] || screenId) + '</span>';
}

function renderDashboard() {
  const tbody = document.getElementById('dashboard-quotes-body');
  if (!tbody) return;
  tbody.innerHTML = QUOTES.slice(0, 5).map(q => {
    const s = STATUS_MAP[q.status];
    return `<tr class="hover:bg-slate-50 transition cursor-pointer" onclick="navigate('quote-detail', '${q.id}')">
      <td class="px-5 py-3.5 font-medium text-navy">${q.id}</td>
      <td class="px-5 py-3.5 text-slate-600">${q.boatName}</td>
      <td class="px-5 py-3.5 text-slate-600">${q.clientName}</td>
      <td class="px-5 py-3.5"><span class="px-2.5 py-1 rounded-full text-xs font-semibold ${s.bg} ${s.text}">${s.label}</span></td>
      <td class="px-5 py-3.5 text-right font-semibold text-navy tabular-nums">${formatPriceShort(q.totalPrice)}</td>
    </tr>`;
  }).join('');
}

function renderBoatsGrid() {

  if (!grid) return;
  grid.innerHTML = BOATS.map(b => `
    <div class="bg-white rounded-xl border border-slate-200 overflow-hidden card-hover cursor-pointer group" onclick="navigate('boat-detail', '${b.id}')">
      <div class="relative overflow-hidden">
        <img src="${b.heroImage}" alt="${b.name}" class="w-full aspect-[4/3] object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy" />
        <div class="absolute top-3 left-3">
          <span class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${b.category === 'new' ? 'bg-emerald-400/90 text-white' : 'bg-amber-400/90 text-white'}">${b.category === 'new' ? 'Novo' : 'Rabljeno'}</span>
        </div>
      </div>
      <div class="p-5">
        <h3 class="font-semibold text-navy text-base mb-1">${b.name}</h3>
        <p class="text-xs text-slate-400 mb-3">${b.year} · ${b.brand}</p>
        <div class="flex items-end justify-between">
          <div class="font-display text-lg font-bold text-primary">${formatPrice(b.basePrice)}</div>
          <span class="text-xs text-primary font-medium opacity-0 group-hover:opacity-100 transition">Detalji →</span>
        </div>

    </div>
  `).join('');
}

function renderBoatDetail(boatId) {
  const boat = BOATS.find(b => b.id === boatId) || BOATS[0];

  document.getElementById('detail-hero').src = boat.heroImage;
  document.getElementById('detail-name').textContent = boat.name;
  document.getElementById('detail-price').textContent = formatPrice(boat.basePrice);
  document.getElementById('detail-year-badge').textContent = boat.year;
  document.getElementById('detail-category-badge').textContent = boat.category === 'new' ? 'Novo' : 'Rabljeno';
  // Thumbnails
  const thumbs = document.getElementById('detail-thumbnails');
  thumbs.innerHTML = boat.images.map(img => `<img src="${img}" class="w-20 h-14 rounded-lg object-cover cursor-pointer border-2 border-transparent hover:border-primary transition flex-shrink-0" onclick="document.getElementById('detail-hero').src=this.src" />`).join('');
  // Specs
  const specsDiv = document.getElementById('detail-specs');
  specsDiv.innerHTML = Object.entries(boat.specs).map(([cat, items]) => `
    <div class="bg-white rounded-xl border border-slate-200 p-5">
      <h4 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">${cat}</h4>
      <div class="space-y-2">${items.map(([l,v]) => `<div class="flex justify-between text-sm"><span class="text-slate-500">${l}</span><span class="font-medium text-navy">${v}</span></div>`).join('')}</div>
    </div>
  `).join('');
  // Gallery
  const gallery = document.getElementById('detail-gallery');
  gallery.innerHTML = boat.images.map(img => `<img src="${img}" class="w-full aspect-[4/3] rounded-xl object-cover cursor-pointer hover:opacity-90 transition" />`).join('');
  // Equipment tab
  const equipList = document.getElementById('detail-equipment-list');
  equipList.innerHTML = boat.equipment.map(cat => `
    <div class="bg-white rounded-xl border border-slate-200 p-5">
      <h4 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">${cat.category}</h4>
      <div class="space-y-2">${cat.items.map(item => `
        <div class="flex justify-between text-sm">
          <span class="text-slate-600">${item.name}</span>
          <span class="${item.standard ? 'text-emerald-500 font-medium' : 'font-semibold text-primary tabular-nums'}">${item.standard ? 'Uključeno' : formatPrice(item.price)}</span>
        </div>`).join('')}</div>
    </div>
  `).join('');
}

  document.querySelectorAll('#config-boat-grid > div').forEach(card => card.classList.remove('boat-selected'));
  event.currentTarget.closest('.bg-white')?.classList.add('boat-selected');
  updateConfigPanel(boat);
  if (window.lucide) lucide.createIcons();
}

  const panel = document.getElementById('config-detail-panel');
  panel.classList.remove('hidden');
  document.getElementById('config-panel-image').src = boat.heroImage;
  document.getElementById('config-panel-name').textContent = boat.name;
  document.getElementById('config-panel-meta').textContent = `${boat.year} · ${boat.brand}`;
  document.getElementById('config-panel-price').textContent = formatPrice(boat.basePrice);
  const specsHtml = Object.values(boat.specs).flat().slice(0, 5).map(([l,v]) => `<div class="flex justify-between text-sm"><span class="text-slate-400">${l}</span><span class="font-medium text-navy">${v}</span></div>`).join('');
  document.getElementById('config-panel-specs').innerHTML = specsHtml;
}

function proceedToStep2() {
  if (!state.selectedBoat) return;
  state.selectedEquipment = {};
  navigate('config-2');
}

function renderConfigStep2() {
  const boat = state.selectedBoat;
  if (!boat) { navigate('config-1'); return; }
  document.getElementById('config2-boat-thumb').src = boat.heroImage;
  document.getElementById('config2-boat-name').textContent = boat.name;
  document.getElementById('config2-boat-meta').textContent = `${boat.year} · ${boat.brand}`;
  document.getElementById('config2-base-price').textContent = formatPrice(boat.basePrice);
  // Render equipment list
  const list = document.getElementById('config-equipment-list');
  list.innerHTML = boat.equipment.map(cat => `
    <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
      <button onclick="toggleAccordion(this)" class="w-full flex items-center justify-between p-5 hover:bg-slate-50 transition">
        <div class="flex items-center gap-3">
          <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 accordion-arrow transition-transform"></i>
          <span class="font-semibold text-navy">${cat.category}</span>
          <span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">${cat.items.length}</span>
        </div>
      </button>
      <div class="accordion-content open border-t border-slate-100">
        <div class="divide-y divide-slate-50">
          ${cat.items.map(item => `
            <label class="flex items-center gap-4 px-5 py-3.5 cursor-pointer hover:bg-slate-50/50 transition ${item.standard ? 'bg-emerald-50/30' : ''}">
              <input type="checkbox" ${item.standard ? 'checked disabled' : ''} ${state.selectedEquipment[item.id] ? 'checked' : ''}
                     onchange="toggleEquipment('${item.id}', ${item.price}, this.checked)"
                     class="w-4 h-4 rounded border-slate-300 ${item.standard ? 'text-emerald-500 cursor-not-allowed' : 'text-primary focus:ring-primary/20 cursor-pointer'}" />
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                  <span class="text-sm font-medium text-navy">${item.name}</span>
                  ${item.standard ? '<span class="px-2 py-0.5 bg-emerald-100 text-emerald-600 text-[10px] font-semibold uppercase tracking-wider rounded-full">Uključeno</span>' : ''}
                </div>
                ${item.desc ? `<div class="text-xs text-slate-400 mt-0.5">${item.desc}</div>` : ''}
              </div>
              <span class="text-sm ${item.standard ? 'font-medium text-slate-400' : 'font-semibold text-primary'} tabular-nums whitespace-nowrap">${item.standard ? 'Standard' : formatPrice(item.price)}</span>
            </label>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
  updatePriceSummary();
}

function toggleEquipment(itemId, price, checked) {
  if (checked) { state.selectedEquipment[itemId] = price; }
  else { delete state.selectedEquipment[itemId]; }
  updatePriceSummary();
}

function updatePriceSummary() {
  const boat = state.selectedBoat;
  if (!boat) return;
  const equipTotal = Object.values(state.selectedEquipment).reduce((a, b) => a + b, 0);
  const grandTotal = boat.basePrice + equipTotal;
  document.getElementById('config2-equip-total').textContent = formatPrice(equipTotal);
  document.getElementById('config2-grand-total').textContent = formatPrice(grandTotal);
  // Selected items list
  const container = document.getElementById('config2-selected-items');
  const entries = Object.entries(state.selectedEquipment);
  if (entries.length === 0) {
    container.innerHTML = '<p class="text-xs text-slate-400 italic">Nema odabranih opcija</p>';
  } else {
    container.innerHTML = entries.map(([id, price]) => {
      const item = boat.equipment.flatMap(c => c.items).find(i => i.id === id);
      return `<div class="flex justify-between text-xs"><span class="text-slate-600 truncate mr-2">${item?.name || id}</span><span class="font-medium text-navy tabular-nums whitespace-nowrap">${formatPrice(price)}</span></div>`;
    }).join('');
  }
}

function proceedToStep3() { navigate('config-3'); }

function proceedToStep4() {
  state.clientData = {
    name: document.getElementById('client-name')?.value || '',
    company: document.getElementById('client-company')?.value || '',
    email: document.getElementById('client-email')?.value || '',
    phone: document.getElementById('client-phone')?.value || '',
    notes: document.getElementById('client-notes')?.value || ''
  };
  navigate('config-4');
}

function renderReview() {
  const boat = state.selectedBoat;
  if (!boat) { navigate('config-1'); return; }
  const equipTotal = Object.values(state.selectedEquipment).reduce((a, b) => a + b, 0);
  const grandTotal = boat.basePrice + equipTotal;
  document.getElementById('review-boat-image').src = boat.heroImage;
  document.getElementById('review-boat-name').textContent = boat.name;
  document.getElementById('review-boat-meta').textContent = `${boat.year} · ${boat.brand}`;
  const firstSpecs = Object.values(boat.specs).flat().slice(0, 3).map(([l,v]) => `${l}: ${v}`).join(' · ');
  document.getElementById('review-boat-specs-brief').textContent = firstSpecs;
  document.getElementById('review-base-price').textContent = formatPrice(boat.basePrice);
  document.getElementById('review-equip-total').textContent = formatPrice(equipTotal);
  document.getElementById('review-grand-total').textContent = formatPrice(grandTotal);
  // Equipment
  const equipDiv = document.getElementById('review-equipment');
  const selectedItems = Object.keys(state.selectedEquipment);
  if (selectedItems.length === 0) {
    equipDiv.innerHTML = '<p class="text-sm text-slate-400 italic">Nema odabranih dodatnih opcija</p>';
  } else {
    const byCategory = {};
    boat.equipment.forEach(cat => {
      const items = cat.items.filter(i => selectedItems.includes(i.id));
      if (items.length > 0) byCategory[cat.category] = items;
    });
    equipDiv.innerHTML = Object.entries(byCategory).map(([cat, items]) => `
      <div>
        <div class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">${cat}</div>
        ${items.map(i => `<div class="flex justify-between text-sm"><span class="text-slate-600">${i.name}</span><span class="font-medium text-navy tabular-nums">${formatPrice(i.price)}</span></div>`).join('')}
      </div>
    `).join('');
  }
  // Client
  const cd = state.clientData;
  document.getElementById('review-client-name').textContent = cd.name || '—';
  document.getElementById('review-client-company').textContent = cd.company || '—';
  document.getElementById('review-client-email').textContent = cd.email || '—';
  document.getElementById('review-client-phone').textContent = cd.phone || '—';
  document.getElementById('review-notes').textContent = cd.notes || 'Nema napomena';
}

function renderQuotesTable() {
  const tbody = document.getElementById('quotes-table-body');
  if (!tbody) return;
  tbody.innerHTML = QUOTES.map(q => {
    const s = STATUS_MAP[q.status];
    return `<tr class="hover:bg-slate-50 transition">
      <td class="px-5 py-4 font-medium text-navy">${q.id}</td>
      <td class="px-5 py-4 text-slate-600">${q.boatName}</td>
      <td class="px-5 py-4 font-medium text-navy">${q.clientName}</td>
      <td class="px-5 py-4 hidden md:table-cell text-slate-400">${q.clientEmail}</td>
      <td class="px-5 py-4"><span class="px-2.5 py-1 rounded-full text-xs font-semibold ${s.bg} ${s.text}">${s.label}</span></td>
      <td class="px-5 py-4 text-right font-semibold text-navy tabular-nums">${formatPrice(q.totalPrice)}</td>
      <td class="px-5 py-4 hidden lg:table-cell text-slate-400 text-sm">${q.date}</td>
      <td class="px-5 py-4 text-center">
        <button onclick="navigate('quote-detail', '${q.id}')" class="p-1.5 text-slate-400 hover:text-primary hover:bg-primary/5 rounded transition" title="Pregledaj">
          <i data-lucide="eye" class="w-4 h-4"></i>
        </button>
      </td>
    </tr>`;
  }).join('');
}

function renderQuoteDetail(quoteId) {
  const quote = QUOTES.find(q => q.id === quoteId) || QUOTES[0];
  const boat = BOATS.find(b => b.id === quote.boatId);
  const s = STATUS_MAP[quote.status];
  document.getElementById('qd-number').textContent = quote.id;
  document.getElementById('qd-status-badge').className = `px-3 py-1 rounded-full text-xs font-semibold ${s.bg} ${s.text}`;
  document.getElementById('qd-status-badge').textContent = s.label;
  document.getElementById('qd-client-name').textContent = quote.clientName;
  document.getElementById('qd-client-company').textContent = quote.clientCompany;
  document.getElementById('qd-client-email').textContent = quote.clientEmail;
  document.getElementById('qd-client-phone').textContent = quote.clientPhone;
  if (boat) {
    document.getElementById('qd-boat-image').src = boat.heroImage;
    document.getElementById('qd-boat-name').textContent = boat.name;
  }
}

// ================================================================
// UI INTERACTIONS
// ================================================================
function toggleAccordion(btn) {
  const content = btn.nextElementSibling;
  const arrow = btn.querySelector('.accordion-arrow');
  content.classList.toggle('open');
  if (arrow) arrow.style.transform = content.classList.contains('open') ? '' : 'rotate(-90deg)';
}

function switchDetailTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('tab-active'); b.classList.add('text-slate-400'); });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
  const btn = document.querySelector(`[data-tab="${tabId}"]`);
  if (btn) { btn.classList.add('tab-active'); btn.classList.remove('text-slate-400'); }
  const content = document.getElementById('tab-' + tabId);
  if (content) content.classList.remove('hidden');
}

function switchSettingsTab(tabId) {
  document.querySelectorAll('.settings-tab-btn').forEach(b => { b.className = 'settings-tab-btn text-left px-4 py-2.5 rounded-lg text-sm font-medium text-slate-500 hover:bg-slate-50 transition'; });
  document.querySelectorAll('.settings-tab-content').forEach(c => c.classList.add('hidden'));
  const btn = document.querySelector(`[data-settings-tab="${tabId}"]`);
  if (btn) btn.className = 'settings-tab-btn text-left px-4 py-2.5 rounded-lg text-sm font-medium bg-primary/10 text-primary transition';
  const content = document.getElementById('settings-' + tabId);
  if (content) content.classList.remove('hidden');
}

function advanceImportStep(step) {
  [1,2,3].forEach(s => {
    document.getElementById('import-step-' + s).classList.toggle('hidden', s !== step);
    const ind = document.getElementById('import-step-' + s + '-indicator');
    const circle = ind?.querySelector('div');
    const text = ind?.querySelector('span');
    if (s < step) {
      if (circle) circle.className = 'w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center text-sm font-bold';
      if (text) { text.className = 'text-sm font-semibold text-emerald-600 hidden sm:block'; }
    } else if (s === step) {
      if (circle) circle.className = 'w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-sm font-bold';
      if (text) { text.className = 'text-sm font-semibold text-navy hidden sm:block'; }
    } else {
      if (circle) circle.className = 'w-8 h-8 rounded-full bg-slate-200 text-slate-400 flex items-center justify-center text-sm font-bold';
      if (text) { text.className = 'text-sm font-medium text-slate-400 hidden sm:block'; }
    }
  });
  if (window.lucide) lucide.createIcons();
}

function toggleMobileSidebar() {
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.getElementById('sidebar-backdrop');
  sidebar.classList.toggle('sidebar-open');
  backdrop.classList.toggle('hidden');
}

function showEquipmentModal() { document.getElementById('modal-equipment').classList.remove('hidden'); if (window.lucide) lucide.createIcons(); }
function showPdfModal() { document.getElementById('modal-pdf').classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

function handleLogin(e) {
  e.preventDefault();
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  navigate('dashboard');
}

function handleLogout() {
  document.getElementById('app-shell').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

// ================================================================
// INIT
// ================================================================
document.addEventListener('DOMContentLoaded', function() {
  if (window.lucide) lucide.createIcons();
});
</script>
</body>
