// ================================================================

function formatPrice(n) {
  return '€' + n.toLocaleString('de-DE');
}

function formatPriceShort(n) {
  if (n >= 1000000) return '€' + (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return '€' + (n / 1000).toFixed(0) + 'K';
  return '€' + n;
}

// ================================================================
// NAVIGATION
// ================================================================
function navigate(screenId, data) {
  // Hide all screens
  document.querySelectorAll('main > section').forEach(s => { s.classList.add('hidden'); s.classList.remove('screen-enter'); });
  // Show target
  const target = document.getElementById('screen-' + screenId);
  if (target) { target.classList.remove('hidden'); void target.offsetWidth; target.classList.add('screen-enter'); }
  // Scroll to top
  const main = document.querySelector('main');
  if (main) main.scrollTop = 0;
  // Update sidebar
  updateSidebar(screenId);
  // Update breadcrumb
  updateBreadcrumb(screenId);
  // Close mobile sidebar
  const sidebar = document.getElementById('sidebar');
  if (sidebar) { sidebar.classList.remove('sidebar-open'); document.getElementById('sidebar-backdrop').classList.add('hidden'); }
  // Screen-specific rendering
  state.currentScreen = screenId;
  if (screenId === 'dashboard') renderDashboard();
  if (screenId === 'boats') renderBoatsGrid();
  if (screenId === 'boat-detail') renderBoatDetail(data);
  if (screenId === 'equipment') renderEquipmentPage(data);
  if (screenId === 'config-1') renderConfigStep1();
  if (screenId === 'config-2') renderConfigStep2();
  if (screenId === 'config-4') renderReview();
  if (screenId === 'quotes') renderQuotesTable();
  if (screenId === 'quote-detail') renderQuoteDetail(data);
  // Re-init lucide icons
  if (window.lucide) lucide.createIcons();
}

function updateSidebar(screenId) {
  const navKey = NAV_MAP[screenId] || screenId;
  document.querySelectorAll('[data-nav]').forEach(btn => {
    if (btn.dataset.nav === navKey) {
      btn.className = 'nav-item w-full flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm font-medium bg-primary text-white';
    } else {
      btn.className = 'nav-item w-full flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm font-medium text-white/70 hover:bg-white/10 hover:text-white';
    }
  });
}

function updateBreadcrumb(screenId) {
  const bc = document.getElementById('breadcrumb');
  if (bc) bc.innerHTML = '<span class="text-slate-500 text-sm">' + (BREADCRUMBS[screenId] || screenId) + '</span>';
}

function renderDashboard() {
  const tbody = document.getElementById('dashboard-quotes-body');
  if (!tbody) return;
  tbody.innerHTML = QUOTES.slice(0, 5).map(q => {
    const s = STATUS_MAP[q.status];
    return `<tr class="hover:bg-slate-50 transition cursor-pointer" onclick="navigate('quote-detail', '${q.id}')">
      <td class="px-3 md:px-4 py-2 md:py-2.5 font-medium text-navy text-xs md:text-sm">${q.id}</td>
      <td class="px-3 md:px-4 py-2 md:py-2.5 text-slate-600 text-xs md:text-sm">${q.boatName}</td>
      <td class="px-3 md:px-4 py-2 md:py-2.5 text-slate-600 text-xs md:text-sm hidden md:table-cell">${q.clientName}</td>
      <td class="px-3 md:px-4 py-2 md:py-2.5"><span class="px-2 py-0.5 rounded-full text-[10px] md:text-xs font-semibold ${s.bg} ${s.text}">${s.label}</span></td>
      <td class="px-3 md:px-4 py-2 md:py-2.5 text-right font-semibold text-navy tabular-nums text-xs md:text-sm">${formatPriceShort(q.totalPrice)}</td>
    </tr>`;
  }).join('');
}

function renderBoatDetail(boatId) {
  const boat = BOATS.find(b => b.id === boatId) || BOATS[0];
  state.selectedBoat = boat;
  document.getElementById('detail-hero').src = boat.heroImage;
  document.getElementById('detail-name').textContent = boat.name;
  document.getElementById('detail-price').textContent = formatPrice(boat.basePrice);
  document.getElementById('detail-year-badge').textContent = boat.year;
  document.getElementById('detail-category-badge').textContent = boat.category === 'new' ? 'Novo' : 'Rabljeno';
  // Thumbnails
  const thumbs = document.getElementById('detail-thumbnails');
  thumbs.innerHTML = boat.images.map(img => `<img src="${img}" class="w-20 h-14 rounded-lg object-cover cursor-pointer border-2 border-transparent hover:border-primary transition flex-shrink-0" onclick="document.getElementById('detail-hero').src=this.src" />`).join('');
  // Specs
  const specsDiv = document.getElementById('detail-specs');
  specsDiv.innerHTML = Object.entries(boat.specs).map(([cat, items]) => `
    <div class="bg-white rounded-xl border border-slate-200 p-5">
      <h4 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">${cat}</h4>
      <div class="space-y-2">${items.map(([l,v]) => `<div class="flex justify-between text-sm"><span class="text-slate-500">${l}</span><span class="font-medium text-navy">${v}</span></div>`).join('')}</div>
    </div>
  `).join('');
  // Gallery
  const gallery = document.getElementById('detail-gallery');
  gallery.innerHTML = boat.images.map(img => `<img src="${img}" class="w-full aspect-[4/3] rounded-xl object-cover cursor-pointer hover:opacity-90 transition" />`).join('');
  // Equipment tab
  const equipList = document.getElementById('detail-equipment-list');
  equipList.innerHTML = boat.equipment.map(cat => `
    <div class="bg-white rounded-xl border border-slate-200 p-5">

          <span class="${item.standard ? 'text-emerald-500 font-medium' : 'font-semibold text-primary tabular-nums'}">${item.standard ? 'Uključeno' : formatPrice(item.price)}</span>
        </div>`).join('')}</div>
    </div>
  `).join('');
}

function selectConfigBoat(boatId, cardEl) {
  const boat = BOATS.find(b => b.id === boatId);
  state.selectedBoat = boat;
  state.selectedEquipment = {};
  // Collapse all expanded cards
  document.querySelectorAll('.boat-card-detail.expanded').forEach(d => d.classList.remove('expanded'));
  // Remove selection from all cards
  document.querySelectorAll('[data-boat-card]').forEach(card => {
    card.classList.remove('border-primary', 'shadow-lg', 'shadow-primary/10');
    card.classList.add('border-slate-200');
    // Remove check icon
    const checkIcon = card.querySelector('.absolute.top-2.left-2');
    if (checkIcon) checkIcon.remove();
  });
  // Select clicked card
  if (cardEl) {
    cardEl.classList.remove('border-slate-200');
    cardEl.classList.add('border-primary', 'shadow-lg', 'shadow-primary/10');
    // Add check icon
    const imgWrapper = cardEl.querySelector('.relative.overflow-hidden');
    if (imgWrapper && !imgWrapper.querySelector('.absolute.top-2.left-2')) {
      const check = document.createElement('div');
      check.className = 'absolute top-2 left-2';
      check.innerHTML = '<div class="w-6 h-6 rounded-full bg-primary text-white flex items-center justify-center"><i data-lucide="check" class="w-3.5 h-3.5"></i></div>';
      imgWrapper.appendChild(check);
    }
    // Expand inline detail on mobile/tablet
    const expandEl = cardEl.querySelector('.boat-card-detail');
    if (expandEl) expandEl.classList.add('expanded');
    // Scroll card into view on mobile
    if (window.innerWidth < 1024) {
      setTimeout(() => cardEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
    }
  }
  // Update desktop panel
  updateConfigPanel(boat);
  if (window.lucide) lucide.createIcons();
}

  document.getElementById('config-panel-image').src = boat.heroImage;

  document.getElementById('config-panel-meta').textContent = `${boat.year} · ${boat.brand}`;

  document.getElementById('config2-equip-total').textContent = formatPrice(equipTotal);
  document.getElementById('config2-grand-total').textContent = formatPrice(grandTotal);
  // Update mobile sticky price bar
  const mobileTotal = document.getElementById('mobile-grand-total');
  if (mobileTotal) mobileTotal.textContent = formatPrice(grandTotal);
  // Selected items list
  const container = document.getElementById('config2-selected-items');
  const entries = Object.entries(state.selectedEquipment);
  if (entries.length === 0) {
    container.innerHTML = '<p class="text-xs text-slate-400 italic">Nema odabranih opcija</p>';

function toggleAccordion(btn) {

}

function switchDetailTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('tab-active'); b.classList.add('text-slate-400'); });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
  const btn = document.querySelector(`[data-tab="${tabId}"]`);
  if (btn) { btn.classList.add('tab-active'); btn.classList.remove('text-slate-400'); }
  const content = document.getElementById('tab-' + tabId);
  if (content) content.classList.remove('hidden');
}

function switchSettingsTab(tabId) {
  document.querySelectorAll('.settings-tab-btn').forEach(b => { b.className = 'settings-tab-btn text-left px-4 py-2.5 rounded-lg text-sm font-medium text-slate-500 hover:bg-slate-50 transition'; });
  document.querySelectorAll('.settings-tab-content').forEach(c => c.classList.add('hidden'));

  const content = document.getElementById('settings-' + tabId);

function advanceImportStep(step) {
  [1,2,3].forEach(s => {
    document.getElementById('import-step-' + s).classList.toggle('hidden', s !== step);
    const ind = document.getElementById('import-step-' + s + '-indicator');
    const circle = ind?.querySelector('div');
    const text = ind?.querySelector('span');
    if (s < step) {
      if (circle) circle.className = 'w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center text-sm font-bold';
      if (text) { text.className = 'text-sm font-semibold text-emerald-600 hidden sm:block'; }
    } else if (s === step) {
      if (circle) circle.className = 'w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-sm font-bold';
      if (text) { text.className = 'text-sm font-semibold text-navy hidden sm:block'; }
    } else {
      if (circle) circle.className = 'w-8 h-8 rounded-full bg-slate-200 text-slate-400 flex items-center justify-center text-sm font-bold';
      if (text) { text.className = 'text-sm font-medium text-slate-400 hidden sm:block'; }
    }
  });
  if (window.lucide) lucide.createIcons();
}

function downloadPdf() {
  const container = document.getElementById('pdf-pages-container');
  const btn = document.getElementById('pdf-download-btn');
  const boat = state.selectedBoat || BOATS[0];
  const filename = 'NM-2025-043_' + boat.name.replace(/\s+/g, '_') + '.pdf';

  btn.innerHTML = '<span class="inline-block w-3.5 h-3.5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> Generiranje...';
  btn.disabled = true;

  const pages = container.querySelectorAll('.pdf-page');
  const opt = {
    margin: 0,
    filename: filename,
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 2, useCORS: true, letterRendering: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['css', 'legacy'], avoid: '.pdf-page' }
  };

  // Clone container so we can style it for export without affecting the modal
  const clone = container.cloneNode(true);
  clone.style.width = '595px';
  clone.querySelectorAll('.pdf-page').forEach(p => {
    p.style.boxShadow = 'none';
    p.style.marginTop = '0';
  });
  // Add page breaks between pages
  const clonePages = clone.querySelectorAll('.pdf-page');
  clonePages.forEach((p, i) => {
    if (i < clonePages.length - 1) {
      p.style.pageBreakAfter = 'always';
    }
  });
  document.body.appendChild(clone);
  clone.style.position = 'absolute';
  clone.style.left = '-9999px';

  html2pdf().set(opt).from(clone).save().then(() => {
    document.body.removeChild(clone);
    btn.innerHTML = '<i data-lucide="download" class="w-3.5 h-3.5"></i> Preuzmi PDF';
    btn.disabled = false;
    if (window.lucide) lucide.createIcons();
  }).catch(() => {
    document.body.removeChild(clone);
    btn.innerHTML = '<i data-lucide="download" class="w-3.5 h-3.5"></i> Preuzmi PDF';
    btn.disabled = false;
    if (window.lucide) lucide.createIcons();
  });
}

            <div style="font-weight:700;font-size:12px;color:#1a1a2e;margin-bottom:2px;">${client.name}</div>
            ${client.company ? `<div style="font-size:10px;color:#64748b;">${client.company}</div>` : ''}
            <div style="font-size:10px;color:#94a3b8;margin-top:4px;">${client.email}${client.phone ? ` · ${client.phone}` : ''}</div>
          </div>
          <div style="flex:1;background:#f8fafc;border-radius:6px;padding:12px 14px;">
            <div class="pdf-section-label">Detalji ponude</div>
            <div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 0;"><span style="color:#64748b;">Broj ponude</span><span style="font-weight:600;color:#1a1a2e;">${quoteNum}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 0;"><span style="color:#64748b;">Datum</span><span style="font-weight:600;color:#1a1a2e;">${dateStr}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 0;"><span style="color:#64748b;">Valjanost</span><span style="font-weight:600;color:#1a1a2e;">30 dana</span></div>
          </div>
        </div>

        <!-- Specifications Grid -->
        <div class="pdf-section-label" style="margin-bottom:8px;">Specifikacije</div>
        <div style="display:grid;grid-template-columns:repeat(${Math.min(specEntries.length, 3)},1fr);gap:12px;margin-bottom:16px;padding:12px 14px;background:#f8fafc;border-radius:6px;">
          ${specsHtml}
        </div>

        <!-- Footer line page 1 -->
        <div style="margin-top:auto;padding-top:12px;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;">
          <div style="font-size:8px;color:#94a3b8;">Navis Marine d.o.o. · Maksimilijanova 41, 10000 Zagreb</div>
          <div style="font-size:8px;color:#94a3b8;">Stranica 1 / 2</div>
        </div>
      </div>
      <div class="pdf-gold-bar"></div>
    </div>

    <!-- PAGE 2 -->
    <div class="pdf-page" style="padding:0;">
      <div class="pdf-gold-bar"></div>
      <div style="padding:24px 32px 20px;">
        <!-- Mini header -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid #e2e8f0;">
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:24px;height:24px;background:#1a1a2e;border-radius:5px;display:flex;align-items:center;justify-content:center;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#c9a961" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg>
            </div>
            <span style="font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:12px;color:#1a1a2e;">Navis Marine</span>
          </div>
          <span style="font-size:10px;font-weight:600;color:#94a3b8;">${quoteNum}</span>
        </div>

        <!-- Equipment Table -->
        <div class="pdf-section-label">Odabrana oprema</div>
        <table class="pdf-table" style="width:100%;border-collapse:collapse;margin-bottom:18px;">
          <thead><tr><th>Stavka</th><th>Cijena</th></tr></thead>
          <tbody>
            ${equipRows}
          </tbody>
        </table>

        <!-- Pricing Summary -->
        <div style="background:#1a1a2e;border-radius:8px;padding:16px 18px;margin-bottom:18px;">
          <div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;"><span style="color:rgba(255,255,255,0.6);">Bazna cijena jahte</span><span style="color:white;font-weight:500;">${formatPrice(boat.basePrice)}</span></div>
          <div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;"><span style="color:rgba(255,255,255,0.6);">Dodatna oprema</span><span style="color:white;font-weight:500;">${formatPrice(equipTotal)}</span></div>
          <div style="border-top:1px solid rgba(255,255,255,0.15);margin-top:8px;padding-top:10px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.7);">Ukupno</span>
            <span style="font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:700;color:#c9a961;">${formatPrice(grandTotal)}</span>
          </div>
        </div>

        ${client.notes ? `
        <!-- Notes -->
        <div style="margin-bottom:14px;">
          <div class="pdf-section-label">Napomene</div>
          <div style="font-size:10px;color:#475569;background:#f8fafc;border-radius:6px;padding:10px 12px;border-left:3px solid #c9a961;">${client.notes}</div>
        </div>
        ` : ''}

        <!-- Terms -->
        <div style="margin-bottom:16px;">
          <div class="pdf-section-label">Uvjeti</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:9.5px;color:#64748b;">
            <div>• Ponuda vrijedi 30 dana od datuma izdavanja</div>
            <div>• PDV nije uključen u navedene cijene</div>
            <div>• Depozit 50% pri potpisu ugovora</div>
            <div>• Rok isporuke: 24-36 mjeseci</div>
            <div>• Cijena podložna promjeni tečaja EUR</div>
            <div>• Garancija prema uvjetima proizvođača</div>
          </div>
        </div>

        <!-- Signature area -->
        <div style="display:flex;gap:24px;margin-bottom:16px;padding-top:8px;">
          <div style="flex:1;">
            <div style="border-bottom:1px solid #cbd5e1;margin-bottom:4px;height:32px;"></div>
            <div style="font-size:8.5px;color:#94a3b8;">Prodavatelj — Navis Marine d.o.o.</div>
          </div>
          <div style="flex:1;">
            <div style="border-bottom:1px solid #cbd5e1;margin-bottom:4px;height:32px;"></div>
            <div style="font-size:8.5px;color:#94a3b8;">Kupac — ${client.name}</div>
          </div>
        </div>

        <!-- Footer -->
        <div style="border-top:1px solid #e2e8f0;padding-top:10px;display:flex;justify-content:space-between;align-items:center;">
          <div style="font-size:8px;color:#94a3b8;line-height:1.6;">
            Navis Marine d.o.o. · OIB: 12345678901 · Maksimilijanova 41, 10000 Zagreb<br>
            www.navis-marine.com · info@navis-marine.com · +385 1 234 5678
          </div>
          <div style="font-size:8px;color:#94a3b8;">Stranica 2 / 2</div>
        </div>
      </div>
      <div class="pdf-gold-bar"></div>
    </div>
  `;

  document.getElementById('pdf-pages-container').innerHTML = pdfHtml;
  document.getElementById('pdf-modal-subtitle').textContent = quoteNum + ' · ' + boat.name;
  document.getElementById('modal-pdf').classList.remove('hidden');
}

function handleLogin(e) {
  e.preventDefault();
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  navigate('dashboard');
}

function handleLogout() {
  document.getElementById('app-shell').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

// ================================================================
// INIT
// ================================================================
document.addEventListener('DOMContentLoaded', function() {
  if (window.lucide) lucide.createIcons();
});
</script>
</body>
</html>
