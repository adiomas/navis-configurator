
<!-- ================================================================ -->
<!-- LOGIN SCREEN                                                      -->
<!-- ================================================================ -->
<div id="login-screen" class="min-h-screen relative flex items-center justify-center overflow-hidden">
  <!-- Background image -->
  <div class="absolute inset-0">
    <img src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=1920&h=1080&fit=crop&q=80"
         alt="" class="w-full h-full object-cover" />
    <div class="absolute inset-0 bg-navy/70 backdrop-blur-sm"></div>
  </div>

  <!-- Login card -->
  <div class="relative z-10 w-full max-w-md mx-4 animate-fade-in">
    <div class="bg-white rounded-xl shadow-2xl p-6 md:p-8">
      <!-- Logo -->
      <div class="text-center mb-5 md:mb-6">
        <div class="inline-flex items-center gap-3 mb-3">
          <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
            <i data-lucide="anchor" class="w-6 h-6 text-white"></i>
          </div>
          <span class="font-display text-2xl font-bold text-navy tracking-tight">Navis Marine</span>
        </div>
        <p class="text-slate-400 text-sm font-medium tracking-wide uppercase">Yacht Configuration System</p>
      </div>

      <!-- Form -->
      <form onsubmit="handleLogin(event)" class="space-y-3 md:space-y-4">
        <div>
          <label class="block text-xs font-semibold text-navy uppercase tracking-wider mb-2">Email</label>
          <input type="email" value="demo@navis-marine.com" placeholder="ime@navis-marine.com"
                 class="w-full px-4 py-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-navy uppercase tracking-wider mb-2">Lozinka</label>
          <input type="password" value="password123" placeholder="••••••••"
                 class="w-full px-4 py-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition" />
        </div>
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" checked class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary/20" />
            <span class="text-sm text-slate-500">Zapamti me</span>
          </label>
          <a href="#" class="text-sm text-primary hover:text-primary-dark transition">Zaboravljena lozinka?</a>
        </div>
        <button type="submit"
                class="w-full py-3 bg-primary hover:bg-primary-dark text-white font-semibold rounded-lg transition shadow-lg shadow-primary/25 hover:shadow-primary/40">
          Prijava
        </button>
      </form>

      <!-- Footer -->
      <p class="text-center text-xs text-slate-400 mt-4">
        &copy; 2025 Navis Marine d.o.o. — Ovlašteni distributer Azimut Yachts
      </p>
    </div>
  </div>
</div>
