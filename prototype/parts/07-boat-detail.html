
<!-- ================================================================ -->
<!-- BOAT DETAIL                                                       -->
<!-- ================================================================ -->
<section id="screen-boat-detail" class="hidden screen-enter">
  <!-- Hero image -->
  <div class="relative h-64 lg:h-80 overflow-hidden">
    <img id="detail-hero" src="" alt="" class="w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-navy/80 via-navy/20 to-transparent"></div>
    <div class="absolute bottom-0 left-0 right-0 p-6 lg:p-8">
      <div class="flex items-end justify-between">
        <div>
          <div class="flex items-center gap-2 mb-2">
            <span id="detail-category-badge" class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-emerald-400/20 text-emerald-300 uppercase tracking-wide">Novo</span>
            <span id="detail-year-badge" class="text-sm text-white/60">2024</span>
          </div>
          <h1 id="detail-name" class="font-display text-2xl lg:text-3xl font-bold text-white">Azimut Grande 120</h1>
        </div>
        <div class="text-right">
          <div class="text-xs text-white/50 uppercase tracking-wider mb-1">Bazna cijena</div>
          <div id="detail-price" class="font-display text-2xl font-bold text-white">€12.500.000</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Thumbnail gallery -->
  <div class="px-6 lg:px-8 py-4 bg-white border-b border-slate-200">
    <div id="detail-thumbnails" class="flex gap-3 overflow-x-auto pb-1">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- Content -->
  <div class="p-6 lg:p-8">
    <!-- Tabs -->
    <div class="flex gap-6 border-b border-slate-200 mb-6">
      <button onclick="switchDetailTab('specs')" class="tab-btn pb-3 text-sm font-semibold tab-active" data-tab="specs">Specifikacije</button>
      <button onclick="switchDetailTab('gallery')" class="tab-btn pb-3 text-sm font-semibold text-slate-400 hover:text-navy transition" data-tab="gallery">Galerija</button>
      <button onclick="switchDetailTab('equip')" class="tab-btn pb-3 text-sm font-semibold text-slate-400 hover:text-navy transition" data-tab="equip">Oprema</button>
    </div>

    <!-- Tab: Specs -->
    <div id="tab-specs" class="tab-content">
      <div id="detail-specs" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Tab: Gallery -->
    <div id="tab-gallery" class="tab-content hidden">
      <div id="detail-gallery" class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Tab: Equipment -->
    <div id="tab-equip" class="tab-content hidden">
      <div id="detail-equipment-list" class="space-y-4">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Action bar -->
    <div class="flex flex-wrap items-center gap-3 mt-8 pt-6 border-t border-slate-200">
      <button onclick="navigate('boats')" class="inline-flex items-center gap-2 px-4 py-2 text-sm text-slate-500 hover:bg-slate-50 rounded-lg transition">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Natrag
      </button>
      <div class="flex-1"></div>
      <button class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-navy hover:bg-slate-50 border border-slate-200 rounded-lg transition">
        <i data-lucide="edit-3" class="w-4 h-4"></i> Uredi
      </button>
      <button onclick="navigateEquipment()" class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-primary hover:bg-primary-dark rounded-lg transition">
        <i data-lucide="settings-2" class="w-4 h-4"></i> Upravljaj opremom
      </button>
      <button class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-red-500 hover:bg-red-50 border border-red-200 rounded-lg transition">
        <i data-lucide="trash-2" class="w-4 h-4"></i> Obriši
      </button>
    </div>
  </div>
</section>
