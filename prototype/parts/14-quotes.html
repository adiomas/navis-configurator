
<!-- ================================================================ -->
<!-- QUOTES LIST                                                       -->
<!-- ================================================================ -->
<section id="screen-quotes" class="hidden p-6 lg:p-8 screen-enter">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
    <div>
      <h1 class="font-display text-2xl font-bold text-navy">Povijest ponuda</h1>
      <p class="text-sm text-slate-400 mt-1">Upravljajte svim kreiranim ponudama</p>
    </div>
    <button onclick="navigate('config-1')" class="inline-flex items-center gap-2 px-5 py-2.5 bg-primary hover:bg-primary-dark text-white text-sm font-semibold rounded-lg transition shadow-sm">
      <i data-lucide="plus" class="w-4 h-4"></i>
      Nova ponuda
    </button>
  </div>

  <!-- Filters -->
  <div class="flex flex-col sm:flex-row gap-3 mb-6">
    <div class="flex-1 flex items-center bg-white rounded-lg px-4 py-2.5 border border-slate-200 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/10 transition">
      <i data-lucide="search" class="w-4 h-4 text-slate-400 mr-3"></i>
      <input type="text" placeholder="Pretraži po broju ponude ili klijentu..." class="bg-transparent text-sm outline-none w-full placeholder:text-slate-400" />
    </div>
    <select class="bg-white rounded-lg px-4 py-2.5 border border-slate-200 text-sm text-slate-600 outline-none cursor-pointer">
      <option>Svi statusi</option>
      <option>Draft</option>
      <option>Sent</option>
      <option>Accepted</option>
      <option>Rejected</option>
    </select>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-slate-50 text-left">
            <th class="px-5 py-3.5 text-xs font-semibold text-slate-400 uppercase tracking-wider"># Ponuda</th>
            <th class="px-5 py-3.5 text-xs font-semibold text-slate-400 uppercase tracking-wider">Brod</th>
            <th class="px-5 py-3.5 text-xs font-semibold text-slate-400 uppercase tracking-wider">Klijent</th>
            <th class="px-5 py-3.5 text-xs font-semibold text-slate-400 uppercase tracking-wider hidden md:table-cell">Email</th>
            <th class="px-5 py-3.5 text-xs font-semibold text-slate-400 uppercase tracking-wider">Status</th>
            <th class="px-5 py-3.5 text-xs font-semibold text-slate-400 uppercase tracking-wider text-right">Iznos</th>
            <th class="px-5 py-3.5 text-xs font-semibold text-slate-400 uppercase tracking-wider hidden lg:table-cell">Datum</th>
            <th class="px-5 py-3.5 text-xs font-semibold text-slate-400 uppercase tracking-wider text-center">Akcije</th>
          </tr>
        </thead>
        <tbody id="quotes-table-body" class="divide-y divide-slate-100">
          <!-- Rendered by JS -->
        </tbody>
      </table>
    </div>
    <!-- Pagination -->
    <div class="flex items-center justify-between px-5 py-3 border-t border-slate-100 bg-slate-50/50">
      <span class="text-xs text-slate-400">Prikazano 6 od 6 ponuda</span>
      <div class="flex items-center gap-1">
        <button class="px-3 py-1.5 text-xs font-medium text-slate-400 bg-white border border-slate-200 rounded-md cursor-not-allowed opacity-50">Prethodna</button>
        <button class="px-3 py-1.5 text-xs font-medium text-white bg-primary rounded-md">1</button>
        <button class="px-3 py-1.5 text-xs font-medium text-slate-400 bg-white border border-slate-200 rounded-md cursor-not-allowed opacity-50">Sljedeća</button>
      </div>
    </div>
  </div>
</section>
