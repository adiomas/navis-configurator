<!-- MODALS                                                            -->

<!-- Equipment Add/Edit Modal -->
<div id="modal-equipment" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/40 modal-backdrop" onclick="closeModal('modal-equipment')"></div>
  <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-md animate-slide-up">
    <div class="flex items-center justify-between p-4 md:p-5 border-b border-slate-100">
      <h3 class="font-display text-lg font-bold text-navy">Dodaj stavku opreme</h3>
      <button onclick="closeModal('modal-equipment')" class="p-1 text-slate-400 hover:text-navy transition">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
    <div class="p-4 md:p-5 space-y-3">
      <div>
        <label class="block text-sm font-semibold text-navy mb-1.5">Naziv stavke *</label>
        <input type="text" placeholder="npr. Premium zvučni sustav" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-navy mb-1.5">Opis</label>
        <textarea rows="2" placeholder="Kratki opis..." class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition resize-none"></textarea>
      </div>
      <div>
        <label class="block text-sm font-semibold text-navy mb-1.5">Cijena (EUR)</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm text-slate-400">€</span>
          <input type="number" placeholder="0" class="w-full pl-8 pr-4 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition" />
        </div>
      </div>
      <label class="flex items-center gap-3 cursor-pointer">
        <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary/20" />
        <div>
          <span class="text-sm font-medium text-navy">Standardna oprema</span>
          <p class="text-xs text-slate-400">Uključeno u baznu cijenu broda</p>
        </div>
      </label>
    </div>
    <div class="flex justify-end gap-3 p-4 md:p-5 border-t border-slate-100">
      <button onclick="closeModal('modal-equipment')" class="px-5 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-lg transition">Odustani</button>
      <button onclick="closeModal('modal-equipment')" class="px-6 py-2.5 bg-primary hover:bg-primary-dark text-white text-sm font-semibold rounded-lg transition">Spremi</button>
    </div>
  </div>
</div>

<!-- PDF Preview Modal -->
<div id="modal-pdf" class="hidden fixed inset-0 z-50 flex items-center justify-center p-2 md:p-4">
  <div class="absolute inset-0 bg-black/60 modal-backdrop" onclick="closeModal('modal-pdf')"></div>
  <div class="relative bg-slate-200 rounded-xl shadow-2xl w-full max-w-3xl max-h-[92vh] flex flex-col animate-slide-up">
    <!-- Modal header -->
    <div class="flex items-center justify-between px-4 py-3 md:px-5 md:py-4 bg-white rounded-t-xl border-b border-slate-200 flex-shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-navy flex items-center justify-center">
          <i data-lucide="file-text" class="w-4 h-4 text-gold"></i>
        </div>
        <div>
          <h3 class="font-display text-base font-bold text-navy">Pregled ponude</h3>
          <p id="pdf-modal-subtitle" class="text-xs text-slate-400">NM-2025-043</p>
        </div>
      </div>
      <button onclick="closeModal('modal-pdf')" class="p-1.5 text-slate-400 hover:text-navy hover:bg-slate-100 rounded-lg transition">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>

    <!-- PDF Pages Container -->
    <div class="flex-1 overflow-y-auto p-3 md:p-5 scroll-touch" style="background: #e2e5e9;">
      <div id="pdf-pages-container">
        <!-- Rendered dynamically by showPdfModal() -->
      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center justify-between px-4 py-3 md:px-5 md:py-4 bg-white rounded-b-xl border-t border-slate-200 flex-shrink-0">
      <span class="text-xs text-slate-400 hidden sm:block">2 stranice · A4</span>
      <div class="flex gap-2 ml-auto">
        <button onclick="closeModal('modal-pdf')" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-lg transition">Zatvori</button>
        <button onclick="closeModal('modal-pdf'); navigate('quotes')" class="px-5 py-2 bg-navy hover:bg-navy-light text-white text-sm font-semibold rounded-lg transition flex items-center gap-2">
          <i data-lucide="download" class="w-3.5 h-3.5"></i> Preuzmi PDF
        </button>
      </div>
    </div>
  </div>
</div>
