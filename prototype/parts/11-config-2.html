<!-- CONFIGURATOR STEP 2 — EQUIPMENT CONFIGURATION                     -->
<!-- ================================================================ -->
<section id="screen-config-2" class="hidden p-6 lg:p-8 screen-enter">
  <!-- Step indicator -->
  <div class="flex items-center justify-center gap-0 mb-8">
    <div class="flex items-center gap-2"><div class="step-circle w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center"><i data-lucide="check" class="w-4 h-4"></i></div><span class="text-sm font-semibold text-emerald-600 hidden sm:block">Jahta</span></div>
    <div class="w-12 lg:w-20 h-px bg-emerald-300 mx-3"></div>
    <div class="flex items-center gap-2"><div class="step-circle w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-sm font-bold">2</div><span class="text-sm font-semibold text-navy hidden sm:block">Oprema</span></div>
    <div class="w-12 lg:w-20 h-px bg-slate-200 mx-3"></div>
    <div class="flex items-center gap-2"><div class="step-circle w-8 h-8 rounded-full bg-slate-200 text-slate-400 flex items-center justify-center text-sm font-bold">3</div><span class="text-sm font-medium text-slate-400 hidden sm:block">Klijent</span></div>
    <div class="w-12 lg:w-20 h-px bg-slate-200 mx-3"></div>
    <div class="flex items-center gap-2"><div class="step-circle w-8 h-8 rounded-full bg-slate-200 text-slate-400 flex items-center justify-center text-sm font-bold">4</div><span class="text-sm font-medium text-slate-400 hidden sm:block">Pregled</span></div>
  </div>

  <div class="flex flex-col lg:flex-row gap-6">
    <!-- Left: Equipment categories -->
    <div class="flex-1 min-w-0">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-display text-xl font-bold text-navy">Konfiguracija opreme</h2>
        <div class="flex items-center bg-white rounded-lg px-3 py-2 border border-slate-200 focus-within:border-primary transition">
          <i data-lucide="search" class="w-4 h-4 text-slate-400 mr-2"></i>
          <input type="text" placeholder="Pretraži opremu..." class="bg-transparent text-sm outline-none w-40 placeholder:text-slate-400" />
        </div>
      </div>

      <div id="config-equipment-list" class="space-y-4">
        <!-- Rendered by JS: accordion categories with checkbox items -->
      </div>
    </div>

    <!-- Right: Price Summary (sticky) -->
    <div class="w-full lg:w-[380px] flex-shrink-0">
      <div class="sticky top-24">
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <!-- Boat info -->
          <div class="p-5 border-b border-slate-100 flex items-center gap-4">
            <img id="config2-boat-thumb" src="" alt="" class="w-16 h-12 rounded-lg object-cover" />
            <div>
              <div id="config2-boat-name" class="font-semibold text-navy text-sm"></div>
              <div id="config2-boat-meta" class="text-xs text-slate-400"></div>
            </div>
          </div>

          <div class="p-5">
            <!-- Base price -->
            <div class="flex justify-between items-center mb-4">
              <span class="text-sm text-slate-500">Bazna cijena</span>
              <span id="config2-base-price" class="text-sm font-semibold text-navy tabular-nums"></span>
            </div>

            <!-- Selected equipment -->
            <div class="mb-4">
              <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Odabrana oprema</div>
              <div id="config2-selected-items" class="space-y-1.5 max-h-48 overflow-y-auto">
                <p class="text-xs text-slate-400 italic">Nema odabranih opcija</p>
              </div>
            </div>

            <!-- Equipment total -->
            <div class="flex justify-between items-center py-3 border-t border-slate-100">
              <span class="text-sm text-slate-500">Oprema ukupno</span>
              <span id="config2-equip-total" class="text-sm font-semibold text-primary tabular-nums">€0</span>
            </div>

            <!-- Grand total -->
            <div class="flex justify-between items-center py-4 border-t-2 border-navy/10 mt-2">
              <span class="text-base font-bold text-navy">UKUPNO</span>
              <span id="config2-grand-total" class="font-display text-2xl font-bold text-navy tabular-nums"></span>
            </div>
          </div>

          <!-- Navigation buttons -->
          <div class="px-5 pb-5 flex gap-3">
            <button onclick="navigate('config-1')" class="flex-1 py-2.5 text-sm font-medium text-slate-600 border border-slate-200 hover:bg-slate-50 rounded-lg transition text-center">
              ← Natrag
            </button>
            <button onclick="proceedToStep3()" class="flex-1 py-2.5 text-sm font-semibold text-white bg-primary hover:bg-primary-dark rounded-lg transition text-center shadow-sm">
              Dalje →
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
