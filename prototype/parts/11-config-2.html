
<!-- ================================================================ -->
<!-- CONFIGURATOR STEP 2 — EQUIPMENT CONFIGURATION                     -->
<!-- ================================================================ -->
<section id="screen-config-2" class="hidden p-3 md:p-4 lg:p-5 screen-enter has-sticky-bar">
  <!-- Step indicator -->
  <div class="flex items-center justify-center gap-0 mb-3 md:mb-5">
    <div class="flex items-center gap-1.5"><div class="step-circle w-6 h-6 md:w-7 md:h-7 rounded-full bg-emerald-500 text-white flex items-center justify-center"><i data-lucide="check" class="w-3.5 h-3.5"></i></div><span class="text-sm font-semibold text-emerald-600 hidden md:block">Jahta</span></div>
    <div class="w-8 md:w-16 h-px bg-emerald-300 mx-1.5 md:mx-2"></div>
    <div class="flex items-center gap-1.5"><div class="step-circle w-6 h-6 md:w-7 md:h-7 rounded-full bg-primary text-white flex items-center justify-center text-xs font-bold">2</div><span class="text-sm font-semibold text-navy hidden md:block">Oprema</span></div>
    <div class="w-8 md:w-16 h-px bg-slate-200 mx-1.5 md:mx-2"></div>
    <div class="flex items-center gap-1.5"><div class="step-circle w-6 h-6 md:w-7 md:h-7 rounded-full bg-slate-200 text-slate-400 flex items-center justify-center text-xs font-bold">3</div><span class="text-sm font-medium text-slate-400 hidden md:block">Klijent</span></div>
    <div class="w-8 md:w-16 h-px bg-slate-200 mx-1.5 md:mx-2"></div>
    <div class="flex items-center gap-1.5"><div class="step-circle w-6 h-6 md:w-7 md:h-7 rounded-full bg-slate-200 text-slate-400 flex items-center justify-center text-xs font-bold">4</div><span class="text-sm font-medium text-slate-400 hidden md:block">Pregled</span></div>
  </div>

  <div class="flex flex-col lg:flex-row gap-3 md:gap-4 lg:gap-5">
    <!-- Left: Equipment categories -->
    <div class="flex-1 min-w-0">
      <div class="flex items-center justify-between mb-3 md:mb-4">
        <h2 class="font-display text-lg md:text-xl font-bold text-navy">Konfiguracija opreme</h2>
        <div class="flex items-center bg-white rounded-lg px-3 py-1.5 border border-slate-200 focus-within:border-primary transition">
          <i data-lucide="search" class="w-4 h-4 text-slate-400 mr-2"></i>
          <input type="text" placeholder="Pretraži opremu..." class="bg-transparent text-sm outline-none w-32 md:w-40 placeholder:text-slate-400" />
        </div>
      </div>

      <div id="config-equipment-list" class="space-y-2 md:space-y-3">
        <!-- Rendered by JS: accordion categories with checkbox items -->
      </div>
    </div>

    <!-- Right: Price Summary (sticky) -->
    <div class="hidden lg:block w-72 lg:w-80 flex-shrink-0">
      <div class="sticky top-16">
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <!-- Boat info -->
          <div class="p-3 md:p-4 border-b border-slate-100 flex items-center gap-3">
            <img id="config2-boat-thumb" src="" alt="" class="w-12 h-9 md:w-16 md:h-12 rounded-lg object-cover" />
            <div>
              <div id="config2-boat-name" class="font-semibold text-navy text-sm"></div>
              <div id="config2-boat-meta" class="text-xs text-slate-400"></div>
            </div>
          </div>

          <div class="p-3 md:p-4">
            <!-- Base price -->
            <div class="flex justify-between items-center mb-3">
              <span class="text-sm text-slate-500">Bazna cijena</span>
              <span id="config2-base-price" class="text-sm font-semibold text-navy tabular-nums"></span>
            </div>

            <!-- Selected equipment -->
            <div class="mb-3">
              <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Odabrana oprema</div>
              <div id="config2-selected-items" class="space-y-1.5 max-h-48 overflow-y-auto">
                <p class="text-xs text-slate-400 italic">Nema odabranih opcija</p>
              </div>
            </div>

            <!-- Equipment total -->
            <div class="flex justify-between items-center py-2.5 border-t border-slate-100">
              <span class="text-sm text-slate-500">Oprema ukupno</span>
              <span id="config2-equip-total" class="text-sm font-semibold text-primary tabular-nums">€0</span>
            </div>

            <!-- Grand total -->
            <div class="flex justify-between items-center py-3 border-t-2 border-navy/10 mt-1">
              <span class="text-sm font-bold text-navy">UKUPNO</span>
              <span id="config2-grand-total" class="font-display text-lg md:text-xl font-bold text-navy tabular-nums"></span>
            </div>
          </div>

          <!-- Navigation buttons -->
          <div class="px-3 md:px-4 pb-3 md:pb-4 flex gap-3">
            <button onclick="navigate('config-1')" class="flex-1 py-2 text-sm font-medium text-slate-600 border border-slate-200 hover:bg-slate-50 rounded-lg transition text-center">
              ← Natrag
            </button>
            <button onclick="proceedToStep3()" class="flex-1 py-2 text-sm font-semibold text-white bg-primary hover:bg-primary-dark rounded-lg transition text-center shadow-sm">
              Dalje →
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile navigation buttons (visible below lg) -->
  <div class="lg:hidden flex gap-3 mt-4">
    <button onclick="navigate('config-1')" class="flex-1 py-2.5 text-sm font-medium text-slate-600 border border-slate-200 hover:bg-slate-50 rounded-lg transition text-center">
      ← Natrag
    </button>
    <button onclick="proceedToStep3()" class="flex-1 py-2.5 text-sm font-semibold text-white bg-primary hover:bg-primary-dark rounded-lg transition text-center shadow-sm">
      Dalje →
    </button>
  </div>

  <!-- Sticky price bar for mobile -->
  <div id="mobile-price-bar" class="sticky-price-bar">
    <div>
      <div class="text-[10px] font-medium text-slate-400 uppercase tracking-wider">Ukupno</div>
      <div id="mobile-grand-total" class="text-lg font-display font-bold text-navy tabular-nums">€0</div>
    </div>
    <button onclick="proceedToStep3()" class="px-4 py-2 bg-primary text-white text-sm font-semibold rounded-lg">
      Dalje →
    </button>
  </div>
</section>
