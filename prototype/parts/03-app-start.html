
<!-- ================================================================ -->
<!-- APP SHELL                                                         -->
<!-- ================================================================ -->
<div id="app-shell" class="hidden min-h-screen">

  <!-- Mobile sidebar backdrop -->
  <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-black/40 z-40 md:hidden modal-backdrop" onclick="toggleMobileSidebar()"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar" class="fixed top-0 left-0 z-50 h-full w-52 bg-navy text-white flex flex-col transform -translate-x-full md:translate-x-0 transition-transform duration-300">
    <!-- Logo -->
    <div class="p-3 border-b border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center flex-shrink-0">
          <i data-lucide="anchor" class="w-5 h-5 text-white"></i>
        </div>
        <div>
          <div class="font-display font-bold text-base tracking-tight leading-tight">Navis Marine</div>
          <div class="text-[10px] text-slate-400 uppercase tracking-widest">Configurator</div>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      <button onclick="navigate('dashboard')" data-nav="dashboard"
              class="nav-item w-full flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm font-medium text-white/70 hover:bg-white/10 hover:text-white">
        <i data-lucide="layout-dashboard" class="w-[18px] h-[18px]"></i>
        <span>Dashboard</span>
      </button>
      <button onclick="navigate('boats')" data-nav="boats"
              class="nav-item w-full flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm font-medium text-white/70 hover:bg-white/10 hover:text-white">
        <i data-lucide="ship" class="w-[18px] h-[18px]"></i>
        <span>Brodovi</span>
      </button>
      <button onclick="navigate('config-1')" data-nav="configurator"
              class="nav-item w-full flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm font-medium text-white/70 hover:bg-white/10 hover:text-white">
        <i data-lucide="sliders-horizontal" class="w-[18px] h-[18px]"></i>
        <span>Konfigurator</span>
      </button>
      <button onclick="navigate('quotes')" data-nav="quotes"
              class="nav-item w-full flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm font-medium text-white/70 hover:bg-white/10 hover:text-white">
        <i data-lucide="file-text" class="w-[18px] h-[18px]"></i>
        <span>Ponude</span>
      </button>
      <button onclick="navigate('import')" data-nav="import"
              class="nav-item w-full flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm font-medium text-white/70 hover:bg-white/10 hover:text-white">
        <i data-lucide="upload" class="w-[18px] h-[18px]"></i>
        <span>Excel Import</span>
      </button>

      <div class="pt-3 mt-3 border-t border-white/10">
        <button onclick="navigate('settings')" data-nav="settings"
                class="nav-item w-full flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm font-medium text-white/70 hover:bg-white/10 hover:text-white">
          <i data-lucide="settings" class="w-[18px] h-[18px]"></i>
          <span>Postavke</span>
        </button>
      </div>
    </nav>

    <!-- User section -->
    <div class="p-3 border-t border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-primary/20 flex items-center justify-center">
          <span class="text-sm font-bold text-primary">MK</span>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-semibold text-white truncate">Marko Kovačević</div>
          <div class="text-xs text-slate-400">Sales Manager</div>
        </div>
        <button onclick="handleLogout()" class="text-slate-400 hover:text-white transition" title="Odjava">
          <i data-lucide="log-out" class="w-4 h-4"></i>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT AREA -->
  <div class="md:ml-52 h-dvh flex flex-col overflow-hidden">

    <!-- HEADER (fixed, never scrolls) -->
    <header class="z-30 h-12 bg-white border-b border-slate-200 flex items-center justify-between px-3 md:px-5 flex-shrink-0">
      <!-- Left: hamburger + breadcrumb -->
      <div class="flex items-center gap-2">
        <button onclick="toggleMobileSidebar()" class="md:hidden p-1.5 -ml-1 text-slate-500 hover:text-navy hover:bg-slate-50 rounded-lg transition" aria-label="Menu">
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <nav id="breadcrumb" class="flex items-center text-sm">
          <span class="text-slate-400">Dashboard</span>
        </nav>
      </div>
      <!-- Right: search + notifications + user -->
      <div class="flex items-center gap-2">
        <div class="hidden sm:flex items-center bg-slate-50 rounded-lg px-3 py-1.5 border border-slate-200 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/10 transition">
          <i data-lucide="search" class="w-4 h-4 text-slate-400 mr-2"></i>
          <input type="text" placeholder="Pretraži..." class="bg-transparent text-sm outline-none w-36 placeholder:text-slate-400" />
        </div>
        <button class="relative p-1.5 text-slate-400 hover:text-navy hover:bg-slate-50 rounded-lg transition">
          <i data-lucide="bell" class="w-4 h-4 md:w-5 md:h-5"></i>
          <span class="absolute top-1 right-1 w-2 h-2 bg-primary rounded-full"></span>
        </button>
        <div class="flex items-center gap-2 pl-2 border-l border-slate-200">
          <div class="w-7 h-7 rounded-full bg-primary/10 flex items-center justify-center">
            <span class="text-xs font-bold text-primary">MK</span>
          </div>
          <span class="hidden md:block text-sm font-medium text-navy">Marko</span>
        </div>
      </div>
    </header>

    <!-- CONTENT AREA (this is the only scrollable area) -->
    <main class="flex-1 overflow-y-auto min-h-0 scroll-touch">
