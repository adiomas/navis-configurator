<!-- ADD NEW BOAT                                                      -->
<!-- ================================================================ -->
<section id="screen-boat-new" class="hidden p-3 md:p-4 lg:p-5 screen-enter">
  <!-- Header -->
  <div class="flex items-center gap-3 mb-4 md:mb-6">
    <button onclick="navigate('boats')" class="p-2 hover:bg-slate-100 rounded-lg transition">
      <i data-lucide="arrow-left" class="w-5 h-5 text-slate-500"></i>
    </button>
    <div>
      <h1 class="font-display text-lg md:text-xl font-bold text-navy">Novi brod</h1>
      <p class="text-sm text-slate-400 mt-0.5">Dodaj novi brod u katalog</p>
    </div>
  </div>

  <!-- Form -->
  <div class="max-w-4xl">
    <div class="bg-white rounded-xl border border-slate-200 p-3 md:p-4 lg:p-5 space-y-5 md:space-y-6">
      <!-- Basic info -->
      <div>
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Osnovne informacije</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-navy mb-1.5">Naziv broda *</label>
            <input type="text" placeholder="npr. Azimut Grande 120" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-navy mb-1.5">Brand</label>
            <select class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition cursor-pointer">
              <option>Azimut</option>
              <option>Benetti</option>
              <option>Riva</option>
              <option>Sanlorenzo</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-navy mb-1.5">Model *</label>
            <input type="text" placeholder="npr. Grande 120" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-navy mb-1.5">Godina</label>
            <input type="number" value="2025" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-navy mb-1.5">Kategorija</label>
            <div class="flex gap-4 mt-1">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="category" value="new" checked class="w-4 h-4 text-primary focus:ring-primary/20" />
                <span class="text-sm">Novo</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="category" value="used" class="w-4 h-4 text-primary focus:ring-primary/20" />
                <span class="text-sm">Rabljeno</span>
              </label>
            </div>
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-navy mb-1.5">Bazna cijena (EUR) *</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm text-slate-400 font-medium">€</span>
              <input type="text" placeholder="0" class="w-full pl-8 pr-4 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition font-semibold" />
            </div>
          </div>
        </div>
      </div>

      <!-- Image upload -->
      <div>
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Fotografija</h3>
        <div class="border-2 border-dashed border-slate-200 rounded-xl p-4 md:p-6 text-center hover:border-primary/50 transition cursor-pointer">
          <div class="w-12 h-12 rounded-lg bg-slate-50 flex items-center justify-center mx-auto mb-3">
            <i data-lucide="image-plus" class="w-6 h-6 text-slate-400"></i>
          </div>
          <p class="text-sm font-medium text-navy">Klikni za upload ili povuci datoteku</p>
          <p class="text-xs text-slate-400 mt-1">PNG, JPG do 5MB — preporučeno 800×500px</p>
        </div>
      </div>

      <!-- Descriptions -->
      <div>
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Opisi</h3>
        <div class="space-y-3">
          <div>
            <label class="block text-sm font-semibold text-navy mb-1.5">Opis (Hrvatski)</label>
            <textarea rows="3" placeholder="Opis broda na hrvatskom..." class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition resize-none"></textarea>
          </div>
          <div>
            <label class="block text-sm font-semibold text-navy mb-1.5">Opis (English)</label>
            <textarea rows="3" placeholder="Boat description in English..." class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition resize-none"></textarea>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100">
        <button onclick="navigate('boats')" class="px-5 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-lg transition">
          Odustani
        </button>
        <button onclick="navigate('boats')" class="px-6 py-2.5 bg-primary hover:bg-primary-dark text-white text-sm font-semibold rounded-lg transition shadow-sm">
          Spremi brod
        </button>
      </div>
    </div>
  </div>
</section>
