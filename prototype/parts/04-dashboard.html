
<!-- ================================================================ -->
<!-- DASHBOARD                                                         -->
<!-- ================================================================ -->
<section id="screen-dashboard" class="p-6 lg:p-8 screen-enter">
  <!-- Welcome -->
  <div class="mb-8">
    <h1 class="font-display text-2xl lg:text-3xl font-bold text-navy">Dobro došli, Marko</h1>
    <p class="text-slate-400 text-sm mt-1">Utorak, 11. veljače 2025.</p>
  </div>

  <!-- Stats cards -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
    <div class="bg-white rounded-xl border border-slate-200 p-5 card-hover">
      <div class="flex items-center justify-between mb-3">
        <div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center">
          <i data-lucide="file-text" class="w-5 h-5 text-primary"></i>
        </div>
        <span class="text-xs font-medium text-emerald-500 bg-emerald-50 px-2 py-0.5 rounded-full">+3 ovaj mj.</span>
      </div>
      <div class="text-2xl font-bold text-navy">12</div>
      <div class="text-xs text-slate-400 font-medium uppercase tracking-wide mt-1">Ukupne ponude</div>
    </div>
    <div class="bg-white rounded-xl border border-slate-200 p-5 card-hover">
      <div class="flex items-center justify-between mb-3">
        <div class="w-10 h-10 rounded-lg bg-amber-50 flex items-center justify-center">
          <i data-lucide="clock" class="w-5 h-5 text-amber-500"></i>
        </div>
        <span class="text-xs font-medium text-amber-500 bg-amber-50 px-2 py-0.5 rounded-full">2 čekaju</span>
      </div>
      <div class="text-2xl font-bold text-navy">3</div>
      <div class="text-xs text-slate-400 font-medium uppercase tracking-wide mt-1">Aktivne ponude</div>
    </div>
    <div class="bg-white rounded-xl border border-slate-200 p-5 card-hover">
      <div class="flex items-center justify-between mb-3">
        <div class="w-10 h-10 rounded-lg bg-emerald-50 flex items-center justify-center">
          <i data-lucide="trending-up" class="w-5 h-5 text-emerald-500"></i>
        </div>
      </div>
      <div class="text-2xl font-bold text-navy">€34.2M</div>
      <div class="text-xs text-slate-400 font-medium uppercase tracking-wide mt-1">Ukupni prihod</div>
    </div>
    <div class="bg-white rounded-xl border border-slate-200 p-5 card-hover">
      <div class="flex items-center justify-between mb-3">
        <div class="w-10 h-10 rounded-lg bg-blue-50 flex items-center justify-center">
          <i data-lucide="ship" class="w-5 h-5 text-primary"></i>
        </div>
      </div>
      <div class="text-2xl font-bold text-navy">6</div>
      <div class="text-xs text-slate-400 font-medium uppercase tracking-wide mt-1">Brodovi u katalogu</div>
    </div>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
    <!-- Recent quotes table -->
    <div class="xl:col-span-2 bg-white rounded-xl border border-slate-200 overflow-hidden">
      <div class="flex items-center justify-between p-5 border-b border-slate-100">
        <h2 class="font-display text-lg font-bold text-navy">Nedavne ponude</h2>
        <button onclick="navigate('quotes')" class="text-sm text-primary hover:text-primary-dark font-medium transition">
          Prikaži sve →
        </button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-slate-50 text-left">
              <th class="px-5 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider"># Ponuda</th>
              <th class="px-5 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Brod</th>
              <th class="px-5 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Klijent</th>
              <th class="px-5 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Status</th>
              <th class="px-5 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider text-right">Iznos</th>
            </tr>
          </thead>
          <tbody id="dashboard-quotes-body">
            <!-- Rendered by JS -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="space-y-4">
      <h2 class="font-display text-lg font-bold text-navy">Brze akcije</h2>
      <button onclick="navigate('config-1')" class="w-full bg-primary hover:bg-primary-dark text-white rounded-xl p-5 text-left card-hover transition group">
        <div class="flex items-center gap-3 mb-2">
          <div class="w-10 h-10 rounded-lg bg-white/20 flex items-center justify-center group-hover:bg-white/30 transition">
            <i data-lucide="plus" class="w-5 h-5"></i>
          </div>
          <span class="font-semibold text-base">Nova ponuda</span>
        </div>
        <p class="text-sm text-white/70">Pokreni konfigurator i kreiraj novu ponudu za klijenta</p>
      </button>
      <button onclick="navigate('boats')" class="w-full bg-white hover:bg-slate-50 border border-slate-200 rounded-xl p-5 text-left card-hover transition">
        <div class="flex items-center gap-3 mb-2">
          <div class="w-10 h-10 rounded-lg bg-navy/5 flex items-center justify-center">
            <i data-lucide="ship" class="w-5 h-5 text-navy"></i>
          </div>
          <span class="font-semibold text-base text-navy">Katalog brodova</span>
        </div>
        <p class="text-sm text-slate-400">Pregledaj i uredi brodove u katalogu</p>
      </button>
      <button onclick="navigate('import')" class="w-full bg-white hover:bg-slate-50 border border-slate-200 rounded-xl p-5 text-left card-hover transition">
        <div class="flex items-center gap-3 mb-2">
          <div class="w-10 h-10 rounded-lg bg-navy/5 flex items-center justify-center">
            <i data-lucide="upload" class="w-5 h-5 text-navy"></i>
          </div>
          <span class="font-semibold text-base text-navy">Import brodova</span>
        </div>
        <p class="text-sm text-slate-400">Uvezi brodove iz Excel datoteke</p>
      </button>
    </div>
  </div>
</section>
