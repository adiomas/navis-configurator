<!-- CONFIGURATOR STEP 1 — SELECT BOAT                                 -->
<!-- ================================================================ -->
<section id="screen-config-1" class="hidden p-3 md:p-4 lg:p-5 screen-enter">
  <!-- Step indicator -->
  <div class="mb-3 md:mb-5">
    <div class="flex items-center justify-center gap-0 mb-3 md:mb-4">
      <div class="flex items-center gap-1.5"><div class="step-circle w-6 h-6 md:w-7 md:h-7 rounded-full bg-primary text-white flex items-center justify-center text-xs font-bold">1</div><span class="text-sm font-semibold text-navy hidden md:block">Odabir jahte</span></div>
      <div class="w-8 md:w-16 h-px bg-slate-200 mx-1.5 md:mx-2"></div>
      <div class="flex items-center gap-1.5"><div class="step-circle w-6 h-6 md:w-7 md:h-7 rounded-full bg-slate-200 text-slate-400 flex items-center justify-center text-xs font-bold">2</div><span class="text-sm font-medium text-slate-400 hidden md:block">Oprema</span></div>
      <div class="w-8 md:w-16 h-px bg-slate-200 mx-1.5 md:mx-2"></div>
      <div class="flex items-center gap-1.5"><div class="step-circle w-6 h-6 md:w-7 md:h-7 rounded-full bg-slate-200 text-slate-400 flex items-center justify-center text-xs font-bold">3</div><span class="text-sm font-medium text-slate-400 hidden md:block">Klijent</span></div>
      <div class="w-8 md:w-16 h-px bg-slate-200 mx-1.5 md:mx-2"></div>
      <div class="flex items-center gap-1.5"><div class="step-circle w-6 h-6 md:w-7 md:h-7 rounded-full bg-slate-200 text-slate-400 flex items-center justify-center text-xs font-bold">4</div><span class="text-sm font-medium text-slate-400 hidden md:block">Pregled</span></div>
    </div>
    <h1 class="font-display text-lg md:text-xl font-bold text-navy text-center">Odaberite jahtu</h1>
  </div>

  <!-- Content: Grid + Detail panel -->
  <div class="flex gap-3 md:gap-4 lg:gap-5">
    <!-- Boat grid -->
    <div class="flex-1">
      <div id="config-boat-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-3 lg:gap-4">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Detail panel — desktop only (hidden on mobile, inline expand handles it) -->
    <div id="config-detail-panel" class="hidden w-72 lg:w-80 flex-shrink-0" data-desktop-panel>
      <div class="sticky top-16 bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
        <img id="config-panel-image" src="" alt="" class="w-full h-36 object-cover" />
        <div class="p-3 md:p-4">
          <h3 id="config-panel-name" class="font-display text-lg font-bold text-navy mb-1"></h3>
          <p id="config-panel-meta" class="text-sm text-slate-400 mb-3"></p>

          <div class="space-y-2 mb-4" id="config-panel-specs">
            <!-- Rendered by JS -->
          </div>

          <div class="pt-3 border-t border-slate-100">
            <div class="text-xs text-slate-400 uppercase tracking-wider mb-1">Bazna cijena</div>
            <div id="config-panel-price" class="font-display text-xl font-bold text-primary"></div>
          </div>

          <button onclick="proceedToStep2()" class="w-full mt-4 py-2.5 bg-primary hover:bg-primary-dark text-white font-semibold rounded-lg transition shadow-sm shadow-primary/25 text-sm">
            Konfiguriraj ovu jahtu →
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
