<!-- CONFIGURATOR STEP 1 — SELECT BOAT                                 -->
<!-- ================================================================ -->
<section id="screen-config-1" class="hidden p-6 lg:p-8 screen-enter">
  <!-- Step indicator -->
  <div class="mb-8">
    <div class="flex items-center justify-center gap-0 mb-6">
      <div class="flex items-center gap-2"><div class="step-circle w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-sm font-bold">1</div><span class="text-sm font-semibold text-navy hidden sm:block">Odabir jahte</span></div>
      <div class="w-12 lg:w-20 h-px bg-slate-200 mx-3"></div>
      <div class="flex items-center gap-2"><div class="step-circle w-8 h-8 rounded-full bg-slate-200 text-slate-400 flex items-center justify-center text-sm font-bold">2</div><span class="text-sm font-medium text-slate-400 hidden sm:block">Oprema</span></div>
      <div class="w-12 lg:w-20 h-px bg-slate-200 mx-3"></div>
      <div class="flex items-center gap-2"><div class="step-circle w-8 h-8 rounded-full bg-slate-200 text-slate-400 flex items-center justify-center text-sm font-bold">3</div><span class="text-sm font-medium text-slate-400 hidden sm:block">Klijent</span></div>
      <div class="w-12 lg:w-20 h-px bg-slate-200 mx-3"></div>
      <div class="flex items-center gap-2"><div class="step-circle w-8 h-8 rounded-full bg-slate-200 text-slate-400 flex items-center justify-center text-sm font-bold">4</div><span class="text-sm font-medium text-slate-400 hidden sm:block">Pregled</span></div>
    </div>
    <h1 class="font-display text-2xl font-bold text-navy text-center">Odaberite jahtu</h1>
    <p class="text-sm text-slate-400 text-center mt-1">Kliknite na jahtu za prikaz detalja</p>
  </div>

  <!-- Content: Grid + Detail panel -->
  <div class="flex gap-6">
    <!-- Boat grid -->
    <div class="flex-1">
      <div id="config-boat-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Detail panel (hidden until boat selected) -->
    <div id="config-detail-panel" class="hidden w-96 flex-shrink-0">
      <div class="sticky top-24 bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
        <img id="config-panel-image" src="" alt="" class="w-full h-48 object-cover" />
        <div class="p-5">
          <h3 id="config-panel-name" class="font-display text-xl font-bold text-navy mb-1"></h3>
          <p id="config-panel-meta" class="text-sm text-slate-400 mb-4"></p>

          <div class="space-y-2 mb-5" id="config-panel-specs">
            <!-- Rendered by JS -->
          </div>

          <div class="pt-4 border-t border-slate-100">
            <div class="text-xs text-slate-400 uppercase tracking-wider mb-1">Bazna cijena</div>
            <div id="config-panel-price" class="font-display text-2xl font-bold text-primary"></div>
          </div>

          <button onclick="proceedToStep2()" class="w-full mt-5 py-3 bg-primary hover:bg-primary-dark text-white font-semibold rounded-lg transition shadow-sm shadow-primary/25">
            Konfiguriraj ovu jahtu →
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
